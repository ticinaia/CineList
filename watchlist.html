<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineList — WatchList</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo-link"><h1>Cine<strong>List</strong></h1></a>
        <nav class="menu">
            <a href="index.html">Filmes <span id="nav-count-filmes">0</span></a>
            <a href="series.html">Séries <span id="nav-count-series">0</span></a>
            <a href="assistidos.html">Assistidos <span id="nav-count-assistidos">0</span></a>
            <a href="watchlist.html">WatchList <span id="nav-count-watchlist">0</span></a>
            <a href="assistindo.html">Assistindo <span id="nav-count-assistindo">0</span></a>
            <a href="sugestoes.html">Sugestões ✦</a>
        </nav>
    </header>

    <main>
        <div id="todos">
            <h2>WatchList <span id="contador">0</span></h2>
            <div id="pesquisa">
                <input type="text" id="buscador" placeholder="Buscar na watchlist...">
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <p class="label">Total</p>
                <h2 id="card-total">0</h2>
                <span>títulos</span>
            </div>
            <div class="card">
                <p class="label">Média das notas</p>
                <h2 id="card-media">0</h2>
                <span>de 5 estrelas</span>
            </div>
            <div class="card">
                <p class="label">Melhor nota</p>
                <h2 id="card-melhor">—</h2>
                <span>estrelas</span>
            </div>
        </div>

        <div id="lista-filmes" class="filmes"></div>
        <div id="vazio" class="vazio hidden">
            <p>Sua watchlist está vazia.</p>
            <a href="index.html">Adicionar filmes</a> ou <a href="series.html">Adicionar séries</a>
        </div>
    </main>

    <div id="modal">
        <div class="modal-content">
            <h2 id="tituloFilme"></h2>
            <img id="posterDetalhe" style="width:100%; border-radius:10px;" alt="">
            <p id="descricaoFilme"></p>
            <p id="suaNota"></p>

            <label>Nota</label>
            <div class="rating">
                <span data-value="1">★</span>
                <span data-value="2">★</span>
                <span data-value="3">★</span>
                <span data-value="4">★</span>
                <span data-value="5">★</span>
            </div>

            <label>Categoria</label>
            <select id="categoriaFilme">
                <option value="Favorito">Favorito</option>
                <option value="Assistido">Assistido</option>
                <option value="Assistindo">Assistindo</option>
                <option value="Quero ver">Quero ver</option>
            </select>

            <label style="display:flex; align-items:center; gap:8px; font-size:14px;">
                <input type="checkbox" id="watchlist"> Adicionar à Watchlist
            </label>

            <div class="modal-actions">
                <button id="salvar">Salvar</button>
                <button id="remover" class="btn-remover">Remover</button>
                <button id="fecharModal">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="nav_counts.js"></script>
    <script src="shared.js"></script>
    <script>inicializarPagina("WatchList");</script>
</body>
</html>
